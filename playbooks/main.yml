---
# ═══════════════════════════════════════════════════════════════
#  Master orchestrator — runs all 4 section playbooks
#
#  Each section playbook writes output-0N.txt independently.
#  This play concatenates them into output.lastrun.txt.
# ═══════════════════════════════════════════════════════════════

- name: "01 — Numbers"
  import_playbook: 01-numbers.yml

- name: "02 — Strings"
  import_playbook: 02-strings.yml

- name: "03 — Lists"
  import_playbook: 03-lists.yml

- name: "04 — Dicts"
  import_playbook: 04-dicts.yml

- name: "Combine section outputs"
  hosts: localhost
  connection: local
  gather_facts: no
  tasks:
    - name: "Concatenate all section files into output.lastrun.txt"
      ansible.builtin.shell: |
        cat {{ playbook_dir }}/../output-01.txt {{ playbook_dir }}/../output-02.txt {{ playbook_dir }}/../output-03.txt {{ playbook_dir }}/../output-04.txt > {{ playbook_dir }}/../output.lastrun.txt
        rm -f {{ playbook_dir }}/../output-01.txt {{ playbook_dir }}/../output-02.txt {{ playbook_dir }}/../output-03.txt {{ playbook_dir }}/../output-04.txt
